<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nulls Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="fb-root"></div>
    <div class="app" id="app">
      <aside class="sidebar glass">
        <header class="sidebar__header">
          <div><h1>Nulls</h1><p id="sidebarSubtitle">Ваши чаты</p></div>
          <button id="newChatBtn" class="icon-btn" title="Новый чат">＋</button>
        </header>

        <section class="auth-card">
          <div id="authState" class="auth-state">Не авторизованы</div>
          <div class="auth-form">
            <input id="localUsername" type="text" placeholder="username" />
            <input id="localPhone" type="text" placeholder="+79991234567" />
            <input id="localPassword" type="password" placeholder="password" />
            <input id="localEmail" type="email" placeholder="email (optional)" />
            <div class="auth-actions">
              <button id="registerBtn" class="small" type="button">Регистрация</button>
              <button id="loginBtn" class="small" type="button">Вход</button>
            </div>
          </div>
          <div class="social-grid">
            <button id="facebookLoginBtn" class="social-btn social-btn--facebook" type="button">Facebook Redirect</button>
          </div>
          <fb:login-button scope="public_profile,email" onlogin="checkLoginState();"></fb:login-button>
          <small id="fbStatus" class="provider-status">Facebook SDK: checking...</small>
          <small id="oauthProviderStatus" class="provider-status">Проверка OAuth-провайдеров...</small>
          <small id="apiMetaStatus" class="provider-status">API metadata: loading...</small>
          <div class="auth-actions"><button id="socialLogoutBtn" class="ghost small" type="button">Выйти</button></div>
          <small id="authHint">Локальный вход + Facebook OAuth.</small>
        </section>

        <label class="search"><span>🔎</span><input type="text" id="chatSearch" placeholder="Поиск..." /></label>
        <nav id="chatList" class="chat-list"></nav>
      </aside>

      <main class="chat glass">
        <header class="chat__header">
          <div class="chat-user" id="chatUser"></div>
          <div class="actions">
            <button id="voiceCallBtn" class="icon-btn" title="Голосовой звонок">📞</button>
            <button id="videoCallBtn" class="icon-btn" title="Видеозвонок">🎥</button>
            <button id="showStatsBtn" class="icon-btn" title="Статистика чата">📊</button>
            <button id="openSettingsBtn" class="icon-btn" title="Настройки">⚙️</button>
          </div>
        </header>

        <section id="messages" class="messages"></section>
        <form id="messageForm" class="composer">
          <input id="messageInput" type="text" placeholder="Напишите сообщение..." autocomplete="off" />
          <button id="sendBtn" type="submit" class="send-btn">Отправить</button>
        </form>
      </main>
    </div>

    <dialog id="settingsDialog" class="modal glass settings-modal">
      <form method="dialog" class="modal__content" id="settingsForm">
        <h2 id="settingsTitle">Огромные настройки</h2>

        <section class="settings-section">
          <h3>Профиль</h3>
          <label><span>Ник</span><input type="text" id="profileNickname" maxlength="24" /></label>
          <label><span>Статус</span><input type="text" id="profileStatus" maxlength="40" /></label>
          <label><span>Аватар (эмодзи)</span><input type="text" id="profileAvatar" maxlength="2" /></label>
          <label><span>Язык</span><select id="languageSelect"><option value="ru">Русский</option><option value="en">English</option><option value="pt">Português</option></select></label>
        </section>

        <section class="settings-section">
          <h3>Внешний вид</h3>
          <label><span>Тема</span><select id="themeMode"><option value="dark">Тёмная</option><option value="light">Светлая</option><option value="system">Системная</option></select></label>
          <label><span>Акцент</span><select id="accentColor"><option value="blue">Blue</option><option value="purple">Purple</option><option value="pink">Pink</option><option value="red">Red</option><option value="orange">Orange</option><option value="green">Green</option></select></label>
          <label><span>Плотность интерфейса</span><select id="uiDensity"><option value="comfortable">Обычная</option><option value="compact">Компактная</option></select></label>
          <label><span>Масштаб шрифта (%)</span><input type="number" id="fontScale" min="85" max="130" step="5" /></label>
          <label class="checkbox-line"><input type="checkbox" id="animationsEnabled" /> Включить анимации</label>
        </section>

        <section class="settings-section">
          <h3>Приватность</h3>
          <label class="checkbox-line"><input type="checkbox" id="privacyHidePhone" /> Скрывать номер телефона</label>
          <label class="checkbox-line"><input type="checkbox" id="privacyReadReceipts" /> Показывать прочтение</label>
          <label class="checkbox-line"><input type="checkbox" id="privacyLastSeen" /> Показывать last seen</label>
          <label class="checkbox-line"><input type="checkbox" id="privacyPreview" /> Показывать превью сообщений</label>
        </section>

        <section class="settings-section">
          <h3>Уведомления</h3>
          <label class="checkbox-line"><input type="checkbox" id="notifSound" /> Звук уведомлений</label>
          <label class="checkbox-line"><input type="checkbox" id="notifDesktop" /> Desktop-уведомления</label>
          <label class="checkbox-line"><input type="checkbox" id="notifVibrate" /> Вибрация (mobile)</label>
          <label class="checkbox-line"><input type="checkbox" id="notifQuietEnabled" /> Тихие часы</label>
          <label><span>Тихие часы с</span><input type="time" id="notifQuietFrom" /></label>
          <label><span>Тихие часы до</span><input type="time" id="notifQuietTo" /></label>
        </section>

        <section class="settings-section">
          <h3>Защита</h3>
          <label class="checkbox-line"><input type="checkbox" id="securityPinEnabled" /> PIN-блокировка (demo)</label>
          <label class="checkbox-line"><input type="checkbox" id="securityBiometric" /> Биометрия (demo)</label>
          <label class="checkbox-line"><input type="checkbox" id="securityLoginAlerts" /> Login alerts</label>
          <label class="checkbox-line"><input type="checkbox" id="securityBlurPreviews" /> Размывать превью чатов</label>
          <label class="checkbox-line"><input type="checkbox" id="security2faDemo" /> 2FA (demo)</label>
          <label><span>Автоблокировка (минуты)</span><input type="number" id="securityAutoLock" min="0" max="120" /></label>
          <label><span>TTL сессии (дней)</span><select id="securitySessionTtl"><option value="7">7 дней</option><option value="30">30 дней</option><option value="90">90 дней</option></select></label>
        </section>

        <section class="settings-section">
          <h3>Чаты и сообщения</h3>
          <label class="checkbox-line"><input type="checkbox" id="chatEnterToSend" /> Enter отправляет сообщение</label>
          <label class="checkbox-line"><input type="checkbox" id="chatAutoMedia" /> Автозагрузка медиа</label>
          <label class="checkbox-line"><input type="checkbox" id="chatStickers" /> Стикеры</label>
          <label class="checkbox-line"><input type="checkbox" id="chatReactions" /> Реакции</label>
          <label class="checkbox-line"><input type="checkbox" id="chatSpellcheck" /> Проверка орфографии</label>
        </section>

        <menu class="modal__actions">
          <button id="cancelBtn" value="cancel" class="ghost">Отмена</button>
          <button id="refreshSessionBtn" type="button" class="ghost">Refresh Session</button>
          <button id="saveSettingsBtn" value="default">Сохранить</button>
        </menu>
      </form>
    </dialog>

    <dialog id="statsDialog" class="modal glass">
      <form method="dialog" class="modal__content">
        <h2>Статистика чата</h2>
        <pre id="chatStatsOutput" class="stats-output">Нет данных</pre>
        <menu class="modal__actions"><button value="cancel" class="ghost">Закрыть</button></menu>
      </form>
    </dialog>

    <dialog id="callDialog" class="modal glass">
      <form method="dialog" class="modal__content call-dialog">
        <h2 id="callTitle">Звонок</h2>
        <p id="callText"></p>
        <div class="call-visual"><div id="callAvatar" class="call-avatar"></div><span class="pulse"></span></div>
        <menu class="modal__actions"><button id="endCallBtn" value="cancel" class="danger">Завершить</button></menu>
      </form>
    </dialog>
    <script>
      window.fbAsyncInit = function() {
        FB.init({
          appId: '1437460264576640',
          cookie: true,
          xfbml: true,
          version: 'v25.0'
        });

        FB.AppEvents.logPageView();

        FB.getLoginStatus(function(response) {
          if (window.statusChangeCallback) {
            window.statusChangeCallback(response, { auto: true });
          }
        });
      };
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <script src="app.js"></script>
  </body>
</html>
