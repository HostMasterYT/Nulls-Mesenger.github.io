<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nulls Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <aside class="sidebar glass">
        <header class="sidebar__header">
          <div>
            <h1>Nulls</h1>
            <p id="sidebarSubtitle">Ваши чаты</p>
          </div>
          <button id="newChatBtn" class="icon-btn" title="Новый чат">＋</button>
        </header>

        <section class="auth-card">
          <div id="authState" class="auth-state">Не авторизованы</div>
          <div class="auth-form">
            <input id="localUsername" type="text" placeholder="username" />
            <input id="localPhone" type="text" placeholder="+79991234567" />
            <input id="localPassword" type="password" placeholder="password" />
            <input id="localEmail" type="email" placeholder="email (optional)" />
            <div class="auth-actions">
              <button id="registerBtn" class="small" type="button">Регистрация</button>
              <button id="loginBtn" class="small" type="button">Вход</button>
            </div>
          </div>
          <div class="social-grid">
            <button id="facebookLoginBtn" class="social-btn social-btn--facebook" type="button">Facebook</button>
            <button id="vkLoginBtn" class="social-btn social-btn--vk" type="button">VK</button>
          </div>
          <small id="oauthProviderStatus" class="provider-status">Проверка OAuth-провайдеров...</small>
          <div class="auth-actions">
            <button id="socialLogoutBtn" class="ghost small" type="button">Выйти</button>
          </div>
          <small id="authHint">Локальный вход + Facebook OAuth + VK OAuth.</small>
        </section>

        <label class="search">
          <span>🔎</span>
          <input type="text" id="chatSearch" placeholder="Поиск..." />
        </label>
        <nav id="chatList" class="chat-list"></nav>
      </aside>

      <main class="chat glass">
        <header class="chat__header">
          <div class="chat-user" id="chatUser"></div>
          <div class="actions">
            <button id="voiceCallBtn" class="icon-btn" title="Голосовой звонок">📞</button>
            <button id="videoCallBtn" class="icon-btn" title="Видеозвонок">🎥</button>
            <button id="openSettingsBtn" class="icon-btn" title="Настройки">⚙️</button>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <form id="messageForm" class="composer">
          <input id="messageInput" type="text" placeholder="Напишите сообщение..." autocomplete="off" />
          <button id="sendBtn" type="submit" class="send-btn">Отправить</button>
        </form>
      </main>
    </div>

    <dialog id="settingsDialog" class="modal glass">
      <form method="dialog" class="modal__content" id="settingsForm">
        <h2 id="settingsTitle">Настройки</h2>

        <section class="settings-section">
          <h3>Профиль</h3>
          <label><span id="labelNickname">Ник</span><input type="text" id="profileNickname" maxlength="24" /></label>
          <label><span id="labelStatus">Статус</span><input type="text" id="profileStatus" maxlength="40" /></label>
          <label><span id="labelAvatar">Аватар (эмодзи)</span><input type="text" id="profileAvatar" maxlength="2" /></label>
        </section>

        <section class="settings-section">
          <h3>Внешний вид</h3>
          <label><span id="labelTheme">Тема</span><select id="themeMode"><option value="dark">Тёмная</option><option value="light">Светлая</option><option value="system">Как в системе</option></select></label>
          <label><span id="labelAccent">Акцент</span><select id="accentColor"><option value="blue">Blue</option><option value="purple">Purple</option><option value="pink">Pink</option><option value="red">Red</option><option value="orange">Orange</option><option value="green">Green</option></select></label>
          <label><span id="labelDensity">Плотность интерфейса</span><select id="uiDensity"><option value="comfortable">Обычная</option><option value="compact">Компактная</option></select></label>
          <label><span id="labelLanguage">Язык</span><select id="languageSelect"><option value="ru">Русский</option><option value="en">English</option><option value="pt">Português</option></select></label>
        </section>

        <section class="settings-section">
          <h3>Защита</h3>
          <label class="checkbox-line"><input type="checkbox" id="securityPinEnabled" /> Включить PIN-блокировку (демо)</label>
          <label class="checkbox-line"><input type="checkbox" id="securityHidePhone" /> Скрывать номер телефона в UI</label>
          <label class="checkbox-line"><input type="checkbox" id="securityLoginAlerts" /> Уведомлять о входе с нового устройства (демо)</label>
          <label class="checkbox-line"><input type="checkbox" id="securityBiometric" /> Запрашивать биометрию при старте (демо)</label>
          <label class="checkbox-line"><input type="checkbox" id="securityBlurPreviews" /> Размывать превью сообщений в списке чатов</label>
          <label>Время сессии
            <select id="securitySessionTtl">
              <option value="7">7 дней</option>
              <option value="30">30 дней</option>
              <option value="90">90 дней</option>
            </select>
          </label>
        </section>

        <menu class="modal__actions">
          <button id="cancelBtn" value="cancel" class="ghost">Отмена</button>
          <button id="saveSettingsBtn" value="default">Сохранить</button>
        </menu>
      </form>
    </dialog>

    <dialog id="callDialog" class="modal glass">
      <form method="dialog" class="modal__content call-dialog">
        <h2 id="callTitle">Звонок</h2>
        <p id="callText"></p>
        <div class="call-visual"><div id="callAvatar" class="call-avatar"></div><span class="pulse"></span></div>
        <menu class="modal__actions"><button id="endCallBtn" value="cancel" class="danger">Завершить</button></menu>
      </form>
    </dialog>

    <script>
      // В проде укажите backend API, например:
      // window.__AUTH_API_BASE__ = 'https://api.yourdomain.com';
      // Facebook App создаётся владельцем аккаунта в Meta Developers: https://developers.facebook.com/
    </script>
    <script src="app.js"></script>
  </body>
</html>
